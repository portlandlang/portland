name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  cibuild:
    # Apple-silicon language, Apple-silicon runner. macOS 26+ only.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-
      - run: script/cibuild
